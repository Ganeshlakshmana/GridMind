version: "3.9"

services:
  # ── PostgreSQL database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gridmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m api.main
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/gridmind
    volumes:
      - ./data:/app/data
      - ./traces:/app/traces
    depends_on:
      - db
    restart: unless-stopped

  # ── MCP server (SSE mode) ───────────────────────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m mcp_server.server sse
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/gridmind
    volumes:
      - ./data:/app/data
    depends_on:
      - db
    restart: unless-stopped

  # ── React frontend (production build via nginx) ─────────────────────────────
  # frontend:
  #   build:
  #     context: ./frontend
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - api

volumes:
  postgres_data:
