version: "3.9"

services:
  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m api.main
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./traces:/app/traces
    restart: unless-stopped

  # ── MCP server (SSE mode) ───────────────────────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m mcp_server.server sse
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # ── React frontend (production build via nginx) ─────────────────────────────
